components:
  schemas:
    Availabilities:
      type: array
      items:
        type: string
    AppointmentRecord:
      type: object
      properties:
        id:
          type: integer
        book:
          type: string
        start:
          type: string
        end:
          type: string
        hash:
          type: string
        location:
          type: string
        color:
          type: string
        status:
          type: string
          enum:
            - Booked
            - Confirmed
            - Rescheduled
            - Cancelled
            - Draft
            - Completed
        notes:
          type: string
        customerId:
          type: integer
        providerId:
          type: integer
        serviceId:
          type: integer
        googleCalendarId:
          type: string
        caldavCalendarId:
          type: string
        paymentStatus:
          type: string
          description: Payment status (pending, paid)
        paymentMethod:
          type: string
          description: Payment method (online, offline)
        stripeSessionId:
          type: string
          description: Stripe checkout session ID
        stripePaymentIntentId:
          type: string
          description: Stripe payment intent ID
        paymentAmount:
          type: number
          format: float
          description: Payment amount
        paymentCurrency:
          type: string
          description: Payment currency (e.g. AED, USD)
        refundAmount:
          type: number
          format: float
          description: Refund amount (if refunded)
        refundStatus:
          type: string
          description: Refund status (none, pending, completed, failed)
          enum:
            - none
            - pending
            - completed
            - failed
        refundReason:
          type: string
          description: Reason for refund
      example:
        id: 1
        book: '2021-01-01 12:00:00'
        start: '2021-01-01 17:00:00'
        end: '2021-01-01 18:00:00'
        hash: apTWVbSvBJXR
        location: Test Street 1A, 12345 Some State, Some Place
        color: '#123456'
        status: Booked
        notes: This is a test appointment.
        customerId: 5
        providerId: 2
        serviceId: 6
        googleCalendarId: null
        caldavCalendarId: null
        paymentStatus: paid
        paymentMethod: online
        stripeSessionId: cs_test_abc123
        stripePaymentIntentId: pi_abc123
        paymentAmount: 250.00
        paymentCurrency: AED
        refundAmount: null
        refundStatus: none
        refundReason: null
    AppointmentPayload:
      type: object
      properties:
        start:
          type: string
        end:
          type: string
        location:
          type: string
        color:
          type: string
        status:
          type: string
        notes:
          type: string
        customerId:
          type: integer
        providerId:
          type: integer
        serviceId:
          type: integer
        stripeSessionId:
          type: string
          description: Stripe checkout session ID (required for online payment). Either this or paymentMethod=offline must be provided when the service has a price > 0.
        paymentMethod:
          type: string
          description: Payment method. Use "offline" for pay-at-clinic. Required when stripeSessionId is not provided and the service has a price > 0.
          enum:
            - online
            - offline
      example:
        start: '2021-01-01 17:00:00'
        end: '2021-01-01 18:00:00'
        location: Test Street 1A, 12345 Some State, Some Place
        color: '#123456'
        status: Booked
        notes: This is a test appointment.
        customerId: 5
        providerId: 2
        serviceId: 6
        stripeSessionId: cs_test_abc123
    UnavailabilityRecord:
      type: object
      properties:
        id:
          type: integer
        book:
          type: string
        start:
          type: string
        end:
          type: string
        hash:
          type: string
        location:
          type: string
        notes:
          type: string
        providerId:
          type: integer
        googleCalendarId:
          type: string
        caldavCalendarId:
          type: string
      example:
        id: 1
        book: '2021-01-01 12:00:00'
        start: '2021-01-01 17:00:00'
        end: '2021-01-01 18:00:00'
